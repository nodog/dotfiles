# ==============================================================================
# 1. CORE & GLOBAL SETTINGS
# ==============================================================================

# Use the backtick (`) as the prefix key instead of Ctrl-b
set -g prefix `
unbind-key C-b
bind-key ` send-prefix

# Automatically pass the active user shell into tmux dynamically
set-option -g default-shell "$SHELL"

# Set window numbering to start at 1 instead of 0
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Automatically renumber windows when a gap is created by closing a window
set-option -g renumber-windows on

# Increase the scrollback history buffer
set-option -g history-limit 9000

# Fix terminal color mapping for Vim/Neovim compatibility
set -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm*:smcup@:rmcup@'


# ==============================================================================
# 2. STATUS BAR & UI COSMETICS
# ==============================================================================

# Put the status bar at the very top of the screen
set-option -g status-position top

# Status bar colors (Purple background, Black text)
set-option -g status-style bg=colour99,fg=black

# Window status colors (Highlight active window in Green)
set-option -g window-status-current-style bg=colour41

# Border line styling for non-active split panes
set-option -g pane-border-style bg=colour240,fg=black

# Border line styling for the active split pane
set-option -g pane-active-border-style bg=colour99,fg=black


# ==============================================================================
# 3. INTERACTIVE NAVIGATION & MOUSE SELECTION
# ==============================================================================

# Enable mouse support (clicking, resizing, scrolling)
set -g mouse on

# Seamlessly enter scrollback mode when scrolling upwards on trackpad/mouse
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
    "send-keys -M" \
    "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"


# ==============================================================================
# 4. KEYBINDINGS & PANE MANAGEMENT
# ==============================================================================

# Reload this configuration file instantly on the fly
bind-key r source-file ~/.tmux.conf \; display "Config reloaded!"

# Use Spacebar to cycle through windows
unbind " "
bind " " next-window

# Clear terminal screen AND pane history scrollback with Ctrl-k
bind -n C-k send-keys C-l \; clear-history

# Send an explicit Ctrl-l key sequence (useful since C-l is used below for Vim)
bind C-l send-keys 'C-l'

# Join panes cleanly using <prefix> j and <prefix> s
bind-key j command-prompt -p "join pane from:" "join-pane -s '%%'"
unbind-key s
bind-key s command-prompt -p "send pane to:"   "join-pane -t '%%'"


# ==============================================================================
# 5. VIM INTEROPERABILITY
# ==============================================================================

# Smart, seamless pane switching with absolute awareness of Vim split windows
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"


# ==============================================================================
# 6. COPY MODE & SYSTEM CLIPBOARD (VI KEYBINDINGS)
# ==============================================================================

# Use native Vim movement syntax inside copy mode
set-window-option -g mode-keys vi

# Hit 'v' inside copy mode to begin a text block selection
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# Hit 'y' inside copy mode to yank directly to the native macOS/Linux clipboard
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'

# Paste buffer content using <prefix> p
bind-key p paste-buffer
